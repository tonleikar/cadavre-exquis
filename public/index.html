<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadavre Exquis</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
      <div class="container">
        <div class="white-box-border">
          <h1 id="game-title">CADAVRE EXQUIS</h1>
          <p class="lobby-subtitle">The exquisite corpse shall drink the new wine</p>
        </div>
        <div class="white-box-border">
          <form id="lobby-form" class="lobby-form" novalidate>
            <div class="lobby-input">
              <label for="player-name">Name:</label>
              <input id="player-name" name="playerName" type="text" maxlength="24" autocomplete="nickname" placeholder="Enter name" required>
            </div>
            <div class="lobby-input">
              <label for="room-code">Room:</label>
              <input id="room-code" name="roomCode" type="text" maxlength="4" placeholder="Enter four digit code">
            </div>
            <div class="lobby-actions">
              <button id="join-room-button" type="button" class="lobby-button">Join Room</button>
              <button id="create-room-button" type="button" class="lobby-button">Create Room</button>
            </div>
            <p id="form-message" class="form-message" role="status" aria-live="polite"></p>
          </form>
        </div>
      </div>
  <script src="lobby.js"></script>
</body>
</html>
