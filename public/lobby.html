<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadavre Exquis</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
      <div class="container">
        <div class="white-box-border">
          <h1 id="game-title">CADAVRE EXQUIS</h1>

        </div>

          </div>
            <div class="lobby-actions">
              <button id="join-room-button" type="button" class="lobby-button">Ready</button>
            </div>
        </div>
      </div>
  <script src="lobby.js"></script>
