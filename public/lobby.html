<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadavre Exquis</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
      <div class="container">
        <div class="white-box-border">
          <h1 id="game-title">CADAVRE EXQUIS</h1>
          <p class="lobby-subtitle">The exquisite corpse shall drink the new wine</p>
        </div>
        <div class="white-box-border">
          <h1>Room Number: <span id="room-number"></span></h1>
          <div id="participants-list" style="margin: 20px 0; min-height: 60px;">
            <p>Waiting for players...</p>
          </div>
          <div class="lobby-actions" style="margin: 20px 0;">
            <label for="grid-size">Choose Grid Size:</label>
            <select id="grid-size" class="lobby-button" style="display: inline-block; margin-left: 10px;">
              <option value="2">2x2</option>
              <option value="3">3x3</option>
              <option value="4">4x4</option>
            </select>
          </div>
          <div class="lobby-actions">
            <button id="start-game-button" type="button" class="lobby-button">Start</button>
          </div>
        </div>
      </div>
  <script src="lobby.js"></script>
</body>
</html>
